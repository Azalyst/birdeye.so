name: Azalyst Alpha Scanner — NIM Qwen Agent

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task for the agent to perform'
        required: true
        type: string
        default: 'run daily_scan and save results to reports/daily_scan.md'

  issue_comment:
    types: [created]

concurrency:
  group: azalyst-signal-engine
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule'
      || (github.event_name == 'workflow_dispatch' && github.actor == github.repository_owner)
      || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent ') && github.event.comment.author_association == 'OWNER')

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify required secrets
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
        run: |
          if [ -z "$NIM_API_KEY" ]; then
            echo "::error::NIM_API_KEY secret is not set"
            exit 1
          fi

      - name: Run agent
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          TASK_INPUT: ${{ inputs.task }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python agent.py "run daily_scan and save results to reports/daily_scan.md"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python agent.py "$TASK_INPUT"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            TASK="${COMMENT_BODY#/agent }"
            python agent.py "$TASK"
          fi

      - name: Commit changes
        run: |
          git config user.name "Azalyst Agent Bot"
          git config user.email "actions@github.com"
          git add -f reports/ agent_output.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No agent output changes to commit"
            exit 0
          fi
          git commit -m "Agent scheduled scan update"
          git pull --rebase -X theirs origin main || git rebase --abort
          git push origin HEAD:main

      - name: Comment on issue
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Agent task completed. Check the workflow run for details.'
            });
