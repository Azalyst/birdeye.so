name: Birdeye Whale Tracking Scan

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - find_pumps
          - analyze_token
  
  # Scheduled - runs every 15 minutes
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  
  # Trigger from issue comments
  issue_comment:
    types: [created]

jobs:
  whale-tracking:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/whale'))
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run Birdeye Scan
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          BIRDEYE_API_KEY: ${{ secrets.BIRDEYE_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled run - do daily scan
            python agent/agent.py "run daily_scan and save results to reports/whale_scan_$(date +%Y%m%d_%H%M%S).txt"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run with input
            if [ "${{ inputs.scan_type }}" = "daily" ]; then
                            python agent/agent.py "run daily_scan and save results to reports/daily_scan_$(date +%Y%m%d_%H%M%S).md"
            elif [ "${{ inputs.scan_type }}" = "find_pumps" ]; then
              python agent/agent.py "find_pumps and show top 10 potential pump tokens"
            fi
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            # Comment trigger
            COMMENT="${{ github.event.comment.body }}"
            TASK="${COMMENT#/whale }"
            python agent/agent.py "$TASK"
          fi
      
      - name: Commit scan results
        if: success()
        run: |
          git config user.name "Whale Tracker Bot"
          git config user.email "bot@github.com"
          git add reports/ || true
          git commit -m "🐋 Whale tracking scan - $(date +%Y-%m-%d)" || true
          git push || true
      
      - name: Comment on issue
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('agent_output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🐋 Whale Tracking Results\n\n${output}`
            });

# Example usage in issues:
# /whale analyze_token token_address=EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
# /whale find_pumps
# /whale track_whale wallet_address=7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU
# /whale daily_scan
